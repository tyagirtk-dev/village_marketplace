<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .header { background: #4CAF50; color: white; padding: 20px; text-align: center; }
        .otp { font-size: 32px; font-weight: bold; text-align: center; padding: 20px; background: #f4f4f4; letter-spacing: 5px; }
        .footer { text-align: center; padding-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Verify Your Email</h2>
        </div>
        <p>Hello {{ name }},</p>
        <p>Thank you for registering at {{ site_name }}. Please use the following OTP to verify your email address:</p>
        <div class="otp">{{ otp }}</div>
        <p>This OTP is valid for 5 minutes.</p>
        <p>If you didn't request this, please ignore this email.</p>
        <div class="footer">
            &copy; {{ site_name }} - Empowering Local Communities
        </div>
    </div>
</body>
</html>
