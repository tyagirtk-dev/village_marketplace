{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="container"><div class="row justify-content-center"><div class="col-md-6"><div class="card shadow"><div class="card-header">Edit Profile</div><div class="card-body"><form method="POST"><div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" value="{{ current_user.name }}" required></div><div class="mb-3"><label>Email</label><input type="email" class="form-control" value="{{ current_user.email }}" disabled></div><div class="mb-3"><label>Mobile</label><input type="text" class="form-control" value="{{ current_user.mobile }}" disabled></div><div class="mb-3"><label>Address</label><textarea name="address" class="form-control">{{ customer.address or '' }}</textarea></div><div class="row"><div class="col"><label>City</label><input name="city" class="form-control" value="{{ customer.city or '' }}"></div><div class="col"><label>State</label><input name="state" class="form-control" value="{{ customer.state or '' }}"></div><div class="col"><label>Pincode</label><input name="pincode" class="form-control" value="{{ customer.pincode or '' }}"></div></div><button type="submit" class="btn btn-primary w-100 mt-3">Update</button></form></div></div></div></div></div>
{% endblock %}
