{% extends "base.html" %}
{% block title %}Write Review{% endblock %}
{% block content %}
<div class="container"><div class="card mx-auto" style="max-width:600px"><div class="card-header">Review: {{ product.name }}</div><div class="card-body"><form method="POST"><div class="mb-3"><label>Rating (1-5)</label><select name="rating" class="form-select" required>{% for i in range(1,6) %}<option value="{{ i }}" {% if review and review.rating == i %}selected{% endif %}>{{ i }} Star{% if i>1 %}s{% endif %}</option>{% endfor %}</select></div><div class="mb-3"><label>Comment</label><textarea name="comment" class="form-control" rows="4" required>{{ review.comment if review else '' }}</textarea></div><button type="submit" class="btn btn-primary">Submit Review</button></form></div></div></div>
{% endblock %}
